project:
  name: etf-agent-trader
  version: 0.1.0
  base_currency: KRW

mode:
  trading_mode: read_only

broker:
  name: toss
  allow_live_order: false

data:
  price_source: yfinance
  start_date: "2015-01-01"
  end_date: null

universe:
  assets:
    - id: growth_equity
      name: 성장/위험 주식
      price_ticker: SPY
      base_weight: 0.35
      max_weight: 0.45

    - id: defensive_equity
      name: 방어적 주식
      price_ticker: USMV
      base_weight: 0.10
      max_weight: 0.25

    - id: short_bond
      name: 단기채
      price_ticker: SHY
      base_weight: 0.20
      max_weight: 0.35

    - id: long_bond
      name: 장기채
      price_ticker: TLT
      base_weight: 0.15
      max_weight: 0.25

    - id: gold
      name: 금
      price_ticker: GLD
      base_weight: 0.10
      max_weight: 0.20

    - id: dollar
      name: 달러성 자산
      price_ticker: UUP
      base_weight: 0.05
      max_weight: 0.15

rebalance:
  frequency: monthly
  min_trade_weight_change: 0.03
  max_turnover_per_rebalance: 0.30

risk:
  min_cash_weight: 0.05
  max_single_asset_weight: 0.45

signals:
  momentum_lookback_months: 6
  volatility_lookback_months: 3
  momentum_weight: 1.0
  volatility_weight: 0.5
  zscore_clip: 2.0

allocation:
  method: anchored_softmax
  softmax_temperature: 1.50
  base_weight_blend: 0.75
  score_weight_blend: 0.25
